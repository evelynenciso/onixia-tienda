<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="../img/OnixiaCirculo.png">

  <link rel="stylesheet" href="../estilos/base.css">
  <link rel="stylesheet" href="../estilos/carrito.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <title>ONIXIA | Carrito</title>
</head>

<body>

  <header>
    <div class="brand">
      <a href="../index.html">
        <img src="../img/OnixiaCirculo.png" alt="logo principal" class="logo">
      </a>
      <span class="brand-name">ONIXIA</span>
    </div>

    <input type="checkbox" id="menu-check" class="menu-check">
    <label for="menu-check" class="menu-toggle">
      <span class="icon-bar"></span>
      <span class="icon-bar"></span>
      <span class="icon-bar"></span>
    </label>

    <label for="menu-check" class="nav-overlay"></label>

    <nav class="nav-container">
      <ul class="nav">
        <li><a href="../index.html">Home</a></li>
        <li><a href="tienda.html">Tienda</a></li>
        <li><a href="contacto.html">Contacto</a></li>
        <li><a href="carrito.html">Carrito <span id="contador-carrito">0</span></a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="carrito-seccion">

      <div class="carrito-layout">

        <!-- Columna izquierda: lista de productos -->
        <div class="carrito-panel">

          <div class="carrito-panel-header">
            <h2>Tu carrito</h2>
            <span id="items-count-label" class="items-count">0 items</span>
          </div>

          <p id="carrito-vacio" style="display:none;">Tu carrito está vacío. ¡Andá a la tienda y agregá algo!</p>

          <div id="carrito-lista" class="carrito-lista">
            <!-- JS inserta acá cada .carrito-item -->
          </div>

          <a href="tienda.html" class="volver-tienda">
            <i class="fa-solid fa-arrow-left"></i> Volver a la tienda
          </a>
        </div>

        <!-- Columna derecha: resumen -->
        <aside class="carrito-resumen">
          <h3>Resumen</h3>

          <div class="resumen-fila">
            <span>ITEMS <span id="resumen-items-count">0</span></span>
            <span id="resumen-subtotal">$0.00</span>
          </div>

          <div class="resumen-bloque">
            <label for="envio-select">ENVÍO</label>
            <select id="envio-select" class="envio-select">
              <option value="0">Retiro en tienda — Gratis</option>
              <option value="1500">Envío estándar — $1500</option>
              <option value="3000">Envío express — $3000</option>
            </select>
          </div>

          <div class="resumen-bloque">
            <label for="codigo-descuento">CÓDIGO DE DESCUENTO</label>
            <div class="codigo-input-wrap">
              <input type="text" id="codigo-descuento" placeholder="Ingresá tu código">
              <button id="btn-aplicar-codigo" aria-label="Aplicar código">
                <i class="fa-solid fa-arrow-right"></i>
              </button>
            </div>
          </div>

          <div class="resumen-total">
            <span>Total:</span>
            <span id="total-general">$0.00</span>
          </div>

          <button id="btn-finalizar" class="btn-finalizar">
            Finalizar compra
          </button>
        </aside>

      </div>

    </section>
  </main>

  <footer class="footer-tienda">
    <p>© 2026 ONIXIA. Todos los derechos reservados.</p>
  </footer>

  <div id="toast-container"></div>

  <!-- MODAL COMPRA 👇 -->
  <div id="modal-compra" class="modal-overlay">
    <div class="modal-contenido">
      <h3 id="estado-compra">Procesando pago...</h3>
      <p id="mensaje-compra">Por favor esperá...</p>
    </div>
  </div>

  <script src="../js/carrito.js"></script>
</body>

</html>
