<!DOCTYPE html>
<html lang="es">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" type="image/x-icon" href="../img/OnixiaCirculo.png">

        <link rel="stylesheet" href="../estilos/base.css">
        <link rel="stylesheet" href="../estilos/productos.css">
        <link rel="stylesheet" href="../estilos/index.css">

     <!--  ICONOS -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
        <title>ONIXIA</title>
        

    </head>

    <body>
       

        <header>
           <div class="brand">
                <a href="index.html">
                    <img src="../img/OnixiaCirculo.png" alt="logo principal" class="logo">
                </a>
                <span class="brand-name">ONIXIA</span>
            </div>

            <!-- MENU NUEVO -->
            <input type="checkbox" id="menu-check" class="menu-check">

            <label for="menu-check" class="menu-toggle">
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
            </label>

            <label for="menu-check" class="nav-overlay"></label>

            <nav class="nav-container">
                <ul class="nav">
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="tienda.html">Tienda</a></li>
                    <li><a href="contacto.html">Contacto</a></li>
                    <li><a href="https://www.google.com" target="_blank">Ir a Google</a></li>
                    <li><a href="carrito.html">Carrito <span id="contador-carrito">0</span></a></li>
                </ul>
            </nav>
        </header>

        
        <main>
            <section class="introduccion">
                <h2>Bienvenidos a nuestra tienda</h2>
                <p>En esta sección vamos a conocer productos,ofertas y novedades</p>
            </section>
            <!-- SECCIÓN 3: MEDIDAS, COLORES, FONDOS, FUENTES E ÍCONOS -->
            <section class="colecion">
                
             <!-- ACÁ EMPIEZA LO NUEVO: botones de filtro -->
                <div class="filtros">
                    <button class="filtro-btn activo" data-categoria="todos">Todos</button>
                    <button class="filtro-btn" data-categoria="remeras">Remeras</button>
                    <button class="filtro-btn" data-categoria="pantalones">Pantalones</button>
                    <button class="filtro-btn" data-categoria="gorros">Gorros</button>
                </div>
             <!-- ACÁ TERMINA LO NUEVO -->

                <div class="tarjetas" id="productos-container">
                </div> 

                
            </section>
        </main>

        <footer class="footer-tienda">
            <p>© 2026 ONIXIA. Todos los derechos reservados.</p>
        </footer>

        <div id="toast-container"></div>

        <!-- MODAL DESCRIPCIÓN PRODUCTO -->
        <div id="modal-overlay" class="modal-overlay">
            <div class="modal-contenido">
                <button id="btn-cerrar-modal" class="btn-cerrar-modal">✕</button>

                <div class="modal-imagen-wrap">
                    <button id="modal-img-prev" class="modal-img-nav prev" aria-label="Imagen anterior">
                        <i class="fa-solid fa-chevron-left"></i>
                    </button>
                    <img id="modal-imagen" src="" alt="">
                    <button id="modal-img-next" class="modal-img-nav next" aria-label="Imagen siguiente">
                        <i class="fa-solid fa-chevron-right"></i>
                    </button>
                </div>

                <h3 id="modal-nombre"></h3>
                <p id="modal-descripcion"></p>
                <div class="modal-footer">
                <span id="modal-precio" class="modal-precio"></span>

                    <button id="modal-btn-agregar" class="btn-agregar">
                        <i class="fa-solid fa-cart-shopping"></i>
                    </button>
                </div>
            </div>
        </div>

        <button id="btn-subir" aria-label="Volver arriba">
         <i class="fa-solid fa-arrow-up"></i>
        </button>
        
        
        <script src="../js/carrito.js"></script>
        <script src="../js/productos.js"></script>
        <script src="js/coleccion.js"></script>
      
    </body>



</html>
